name: CI

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'bun'
        
    - name: Install dependencies
      run: bun install
      
    - name: Type check
      run: bun run typecheck
      
    - name: Run tests
      run: bun run test:run
      
    - name: Lint
      run: bun run lint
      
    - name: Build
      run: bun run build
      continue-on-error: true
      
    - name: Enforce no em-dashes
      run: |
        if grep -r "—\|–" --include="*.ts" --include="*.js" --include="*.md" src/; then
          echo "Em-dash or en-dash found! Please remove all em-dashes and en-dashes."
          exit 1
        fi
        echo "No em-dashes or en-dashes found."